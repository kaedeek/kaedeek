name: Metrics

on:
  schedule: [{ cron: "0 0,6,12,18 * * *" }]
  workflow_dispatch:
  push: { branches: ["main"] }

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: kaedeek

          # デザイン
          template: terminal
          base: ""
          config_timezone: Asia/Tokyo

          # 言語
          plugin_languages: yes
          plugin_languages_limit: 8

          # 活動
          plugin_activity: yes
          plugin_activity_limit: 5

          # コミット数
          plugin_lines: yes

          # カレンダー
          plugin_isocalendar: yes

          # スター
          plugin_stars: yes

          # リポジトリ
          plugin_repositories: yes
          plugin_repositories_featured: yes

          # 追跡
          plugin_followup: yes

          # トラフィック
          plugin_traffic: yes